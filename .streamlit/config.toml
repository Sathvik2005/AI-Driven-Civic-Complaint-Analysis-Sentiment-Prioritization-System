[theme]
primaryColor = "#0A66C2"
backgroundColor = "#0F1419"
secondaryBackgroundColor = "#1A1F26"
textColor = "#FFFFFF"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200

[logger]
level = "info"

[browser]
gatherUsageStats = false
